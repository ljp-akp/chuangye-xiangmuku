<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创业项目库</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{
background:#f5f7fa;
padding-bottom:80px;
}

.header{
background:linear-gradient(135deg,#1677ff,#4da3ff);
padding:30px 20px;
color:white;
}

.logo{
font-size:28px;
font-weight:bold;
}

.desc{
margin-top:10px;
opacity:.9;
}

.search{
padding:15px;
}

.search input{
width:100%;
height:45px;
border:none;
border-radius:25px;
padding:0 15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.category{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:15px;
}

.category div{
background:white;
padding:12px;
border-radius:12px;
text-align:center;
font-size:14px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.title{
padding:15px;
font-size:18px;
font-weight:bold;
}

.project-list{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.card-title{
font-size:14px;
height:42px;
overflow:hidden;
}

.price{
margin-top:10px;
color:#ff4d4f;
font-size:20px;
font-weight:bold;
}

.tag{
display:inline-block;
margin-top:8px;
background:#fff7e6;
color:#fa8c16;
padding:3px 8px;
border-radius:6px;
font-size:12px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -2px 10px rgba(0,0,0,.08);
}

.bottom div{
text-align:center;
font-size:13px;
}

.vip{
margin:15px;
background:linear-gradient(135deg,#f7ba1e,#ffd666);
padding:20px;
border-radius:15px;
color:white;
}

.vip button{
margin-top:10px;
border:none;
background:white;
color:#f7ba1e;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">创业项目库</div>
<div class="desc">
精选创业项目 · AI项目 · 网创资源 · 每日更新
</div>
</div>

<div class="search">
<input placeholder="搜索创业项目...">
</div>

<div class="category">
<div>🤖 AI项目</div>
<div>🎬 短视频</div>
<div>📕 小红书</div>
<div>🎵 抖音项目</div>
<div>🌍 海外项目</div>
<div>📈 引流推广</div>
<div>💎 知识付费</div>
<div>🛠 软件工具</div>
</div>

<div class="vip">
<h3>VIP会员专区</h3>
<p>开通会员，全站资源免费下载</p>
<button>立即开通</button>
</div>

<div class="title">🔥 热门项目</div>

<div class="project-list">

<div class="card">
<img src="https://picsum.photos/400/250?1">
<div class="card-body">
<div class="card-title">
AI猫咪短视频玩法
</div>
<div class="price">¥29.9</div>
<div class="tag">AI项目</div>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?2">
<div class="card-body">
<div class="card-title">
海外流量变现项目
</div>
<div class="price">¥29.9</div>
<div class="tag">热门</div>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?3">
<div class="card-body">
<div class="card-title">
AI数字人直播项目
</div>
<div class="price">¥29.9</div>
<div class="tag">推荐</div>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/250?4">
<div class="card-body">
<div class="card-title">
旅游攻略资料项目
</div>
<div class="price">¥29.9</div>
<div class="tag">资料</div>
</div>
</div>

</div>

<div class="bottom">
<div>🏠<br>首页</div>
<div>📂<br>分类</div>
<div>➕<br>发布</div>
<div>👑<br>会员</div>
<div>👤<br>我的</div>
</div>

</body>
</html>
